<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solar System Live View</title>
  <meta name="description" content="An interactive, real-time 3D simulation of our Solar System, planets, orbits, and spacecraft, inspired by NASA's Eyes on the Solar System.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <!-- 3D Orbit Canvas Viewport -->
    <canvas id="space-viewport"></canvas>

    <!-- Top Navigation Header -->
    <header class="ui-layer">
      <div class="brand">
        <h1>Eyes on Space</h1>
        <span>SOLAR SYSTEM LIVE</span>
      </div>
      <div class="header-actions interactive">
        <button id="audio-toggle-btn" class="icon-btn" title="Toggle Sound">
          <!-- Audio Speaker Icon (muted initially) -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <line x1="22" y1="9" x2="16" y2="15"></line>
            <line x1="16" y1="9" x2="22" y2="15"></line>
          </svg>
        </button>
        <button id="search-btn" class="icon-btn" title="Search Planets">
          <!-- Search Icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Right Side Camera Controls -->
    <div class="floating-controls ui-layer">
      <div class="control-panel glass-panel interactive">
        <button id="btn-zoom-in" class="icon-btn" title="Zoom In">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="btn-zoom-out" class="icon-btn" title="Zoom Out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        <button id="btn-reset" class="icon-btn" title="Reset View">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
        <button id="btn-drag-mode" class="icon-btn" title="Toggle Drag Mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="5 9 2 12 5 15"></polyline>
            <polyline points="9 5 12 2 15 5"></polyline>
            <polyline points="15 19 12 22 9 19"></polyline>
            <polyline points="19 9 22 12 19 15"></polyline>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="12" y1="2" x2="12" y2="22"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Bottom Simulation Timeline Panel -->
    <footer class="ui-layer">
      <div class="hud-panel glass-panel interactive">
        <div class="hud-header">
          <div id="live-indicator" class="live-status" title="Reset to Live Current Date">
            <div class="live-dot"></div>
            <span>LIVE</span>
          </div>
          <div class="time-display">
            <span id="hud-date">JUL 04, 2026</span>
            <span id="hud-time">02:10:00 PM</span>
          </div>
        </div>

        <div class="timeline-controls">
          <button id="play-pause-btn" class="play-btn" title="Play/Pause">Pause</button>
          
          <div class="slider-container">
            <div class="slider-labels">
              <span>REV</span>
              <span>REAL RATE</span>
              <span>FWD</span>
            </div>
            <input type="range" id="rate-slider" class="timeline-slider" min="-8" max="8" value="2" step="1">
          </div>
        </div>
        <div id="rate-label">REAL RATE</div>
      </div>
    </footer>

    <!-- Bottom Sheet Planet Details Modal -->
    <div id="details-sheet" class="details-sheet glass-panel">
      <div class="details-drag-handle"></div>
      
      <div class="details-header">
        <div class="details-title-row">
          <!-- Mini spinning visual representation of planet -->
          <canvas id="detail-planet-canvas" width="120" height="120"></canvas>
          <div class="details-title">
            <h2 id="detail-name">EARTH</h2>
            <span id="detail-type">PLANET</span>
          </div>
        </div>
        <button id="close-details-btn" class="icon-btn" title="Close Details">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <div class="details-body">
        <!-- Overview description -->
        <div>
          <h3 class="detail-section-title">Overview</h3>
          <p id="detail-desc" class="detail-desc-text">Earth is the third planet from the Sun...</p>
        </div>

        <!-- Vital Statistics Grid -->
        <div>
          <h3 class="detail-section-title">Real-Time Stats</h3>
          <div id="detail-stats" class="stats-grid">
            <div class="stat-row">
              <span class="stat-name">DISTANCE</span>
              <span class="stat-val">1.00 AU</span>
            </div>
            <div class="stat-row">
              <span class="stat-name">YEAR</span>
              <span class="stat-val">365 Days</span>
            </div>
          </div>
        </div>

        <!-- Moons section -->
        <div id="detail-moons-section">
          <h3 class="detail-section-title">Key Moons</h3>
          <div id="detail-moons-list" class="moons-list">
            <!-- Pilled moons names -->
          </div>
        </div>

        <!-- Fun Facts -->
        <div>
          <h3 class="detail-section-title">NASA Facts</h3>
          <ul id="detail-facts-list" class="facts-list">
            <!-- Bulleted facts -->
          </ul>
        </div>
      </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="search-modal">
      <div class="search-container glass-panel interactive">
        <div class="search-input-wrapper">
          <input type="text" id="search-input" placeholder="Search planet, star, or probe..." autocomplete="off">
        </div>
        <div id="search-results" class="search-results">
          <!-- Dynamically populated items -->
