<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solar System Live View</title>
  <meta name="description" content="An interactive, real-time 3D simulation of our Solar System, planets, orbits, and spacecraft, inspired by NASA's Eyes on the Solar System.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-container">
    <!-- 3D Orbit Canvas Viewport -->
    <canvas id="space-viewport"></canvas>

    <!-- Top Navigation Header -->
    <header class="ui-layer">
      <div class="brand">
        <h1>Eyes on Space</h1>
        <span>SOLAR SYSTEM LIVE</span>
      </div>
      <div class="header-actions interactive">
        <button id="audio-toggle-btn" class="icon-btn" title="Toggle Sound">
